# GarmentHub — nginx snippets for product image uploads (multipart /api/upload/images)
#
# Copy into your server { } or location that proxies to the Node API. Reload: nginx -s reload
#
# Without this, nginx often defaults client_max_body_size to 1m and returns HTML 413 for
# several phone photos in one request — the browser then sees "page instead of JSON".

# Allow large multipart bodies (many full-resolution phone images per request).
# If 413 persists, raise further (e.g. 200m) or reduce `VITE_UPLOAD_IMAGE_CHUNK` on the frontend.
client_max_body_size 100m;

# Slow mobile networks: avoid gateway HTML 502/504 while the upstream reads the body.
proxy_connect_timeout 120s;
proxy_send_timeout 120s;
proxy_read_timeout 120s;

# Optional: if you buffer large uploads to disk (default is memory+disk mix).
# proxy_request_buffering on;
