name: garmenthub_mobile
description: GarmentHub mobile client (aligned with packages/frontend).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  file_picker: ^8.1.4
  url_launcher: ^6.3.1
  receive_sharing_intent: ^1.8.1
  path_provider: ^2.1.5
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
